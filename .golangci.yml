version: "2"

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - nilerr
    - staticcheck
    - unused
    - unparam
    - revive
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - revive
      - path: internal/auth/chrome\.go
        linters:
          - gosec
      - path: internal/cli/shared\.go
        linters:
          - gosec
      - path: internal/client/http\.go
        linters:
          - gosec
      - path: internal/client/constants\.go
        linters:
          - gosec
      - path: internal/client/features\.go
        linters:
          - gosec
      - path: internal/config/config\.go
        linters:
          - gosec
          - nilerr
      - path: internal/testutil/.*
        linters:
          - gosec
