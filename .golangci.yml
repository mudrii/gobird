version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - revive
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - revive
      - linters:
          - errcheck
        text: "Error return value of `.*\\.Close` is not checked"
