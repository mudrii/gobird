name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Verify
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race
        run: go test -race ./...

      - name: Build
        run: go build -ldflags "-X main.version=ci -X main.gitSHA=${{ github.sha }}" ./cmd/bird
